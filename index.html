<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <title>Plus Add On Week 2 World clock</title>
  </head>
  <body>

    <div class="container">
      <h1><a href="index.html"></a>What time is it now?</h1>

    
      <select name="" id="city-dropdown">
        <option value="">Select a city below</option>
        <option value="current">My current location</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Moscow">Moscow</option>
        <option value="Asia/Hong_Kong">Hong Kong</option>
        <option value="Asia/Jakarta">Jakarta</option>
        <option value="Pacific/Auckland">Auckland</option>
      </select>

      <div id="city-list">
      <div class="city" id="santiago">
        <div>
        <h2>Santiago</h2>
        <div class="date">15th April 2026</div>
        </div>
        <div class="time">6:35<small>AM</small></div>
      </div>

      <div class="city" id="melbourne">
        <div>
        <h2>Melbourne</h2>
        <div class="date">15th April 2026</div>
        </div>
        <div class="time">6:35<small>AM</small></div>
      </div>

      <div class="city" id="bangkok">
        <div>
        <h2>Bangkok</h2>
        <div class="date">15th April 2026</div>
        </div>
        <div class="time">6:35<small>AM</small></div>
      </div>
      </div>

    <footer>
      This project is created by
      <a href="https://www.dorothylei.com" target="_blank">Dorothy Lei</a> and is open sourced on
      <a href="https://github.com/dorothylei" target="_blank">Github</a>.
    </footer>
  </body>
  <script src="src/index.js"></script>
</html>
